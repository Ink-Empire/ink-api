services:
    laravel.app:
        build:
            context: .
            dockerfile: Dockerfile.sail
        ports:
            - '${APP_PORT:-80}:80'
        volumes:
            - '.:/var/www/html'
        working_dir: /var/www/html
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: '${DB_DATABASE:-inkedin}'
            DB_USERNAME: '${DB_USERNAME:-sail}'
            DB_PASSWORD: '${DB_PASSWORD:-password}'
            REDIS_HOST: redis
            REDIS_PORT: 6379
            ELASTICSEARCH_HOST: 'http://elasticsearch'
            ELASTICSEARCH_PORT: 9200
            WWWUSER: "${WWWUSER}"
            LARAVEL_SAIL: 1
            SAIL_XDEBUG_MODE: "develop,debug,coverage"
            XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-develop,debug}"
            XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}"
            IGNITION_LOCAL_SITES_PATH: "${PWD}"
            PHP_IDE_CONFIG: "serverName=Docker"

        networks:
            - sail
        depends_on:
            - mysql
            - redis
            - elasticsearch
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "php", "-v"]
            retries: 3
            timeout: 5s

    frontend:
        build:
            context: /Users/carolineennis/inkedin/inked-in-www/nextjs
            dockerfile: Dockerfile.dev
        ports:
            - '4000:3000'
        volumes:
            - '/Users/carolineennis/inkedin/inked-in-www/nextjs:/app'
            - '/app/node_modules'
        environment:
            - NEXT_PUBLIC_API_URL=http://localhost/api
            - NODE_ENV=development
        command: npm run dev
        networks:
            - sail
        depends_on:
            - laravel.app
        restart: unless-stopped
    mysql:
        image: 'mysql/mysql-server:8.0'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE:-inkedin}'
            MYSQL_USER: '${DB_USERNAME:-sail}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './docker/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-password}"]
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
        environment:
            - discovery.type=single-node
            - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
            - xpack.security.enabled=false
        volumes:
            - 'sail-elasticsearch:/usr/share/elasticsearch/data'
        ports:
            - '${FORWARD_ELASTICSEARCH_PORT:-9200}:9200'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9200"]
            retries: 3
            timeout: 5s

    kibana:
        image: docker.elastic.co/kibana/kibana:7.17.10
        ports:
            - '${FORWARD_KIBANA_PORT:-5601}:5601'
        environment:
            - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
        depends_on:
            - elasticsearch
        networks:
            - sail
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:5601"]
            retries: 3
            timeout: 15s

networks:
    sail:
        driver: bridge

volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
    sail-elasticsearch:
        driver: local
