name: Smoke Test

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API URL to test against'
        required: false
        default: ''
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, json

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run smoke tests
        env:
          API_APP_TOKEN: ${{ secrets.API_APP_TOKEN }}
        run: |
          # Use input URL, or fall back to secret, or skip gracefully
          API_URL="${{ github.event.inputs.api_url }}"
          if [ -z "$API_URL" ]; then
            API_URL="${{ secrets.STAGING_API_URL }}"
          fi

          if [ -z "$API_URL" ]; then
            echo "::warning::No API URL configured. Set STAGING_API_URL secret or provide api_url input."
            exit 0
          fi

          echo "Running smoke tests against: $API_URL"
          php artisan smoke:test --base-url="$API_URL" -v
