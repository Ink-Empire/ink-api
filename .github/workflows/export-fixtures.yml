name: Export API Fixtures

on:
  push:
    branches: [main, develop]
    paths:
      # Only run when API response structure might change
      - 'app/Http/Controllers/**'
      - 'app/Http/Resources/**'
      - 'routes/**'
      - 'tests/Feature/Contracts/**'
      - 'database/migrations/**'
  workflow_dispatch:  # Allow manual trigger

env:
  S3_BUCKET: inked-in-images
  S3_PREFIX: fixtures
  AWS_REGION: us-east-1

jobs:
  export-fixtures:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run contract tests and export fixtures
        run: EXPORT_FIXTURES=true php artisan test --filter=Contracts
        env:
          APP_ENV: testing
          APP_KEY: base64:n6zkIV5WDuC19w9U/m6SYPLpeZvuEDYpjtj5OvzM96w=
          APP_URL: http://localhost
          FRONTEND_URL: http://localhost:3000
          API_APP_TOKEN: ""
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
          MAIL_MAILER: array
          SCOUT_DRIVER: "null"
          TELESCOPE_ENABLED: false
          PULSE_ENABLED: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get branch name
        id: branch
        run: echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Upload fixtures to S3
        run: |
          aws s3 sync tests/fixtures/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/${{ steps.branch.outputs.name }}/ --delete
          echo "Fixtures uploaded to s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/${{ steps.branch.outputs.name }}/"

      - name: Upload latest tag for easy access
        if: github.ref_name == 'main'
        run: |
          aws s3 sync tests/fixtures/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/latest/ --delete
